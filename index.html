        // ==========================================
        // EDITOR FUNCTIONALITY
        // ==========================================
        
        const editor = document.getElementById('editor');
        const floater = document.getElementById('floater');
        const varContainer = document.getElementById('variablesContainer');
        const templateList = document.getElementById('templateList');
        const statusInd = document.getElementById('statusIndicator');

        if (editor) {
            editor.addEventListener('mouseup', handleSelection);
            editor.addEventListener('keyup', handleSelection);

            let touchTimer = null;
            editor.addEventListener('touchend', () => {
                clearTimeout(touchTimer);
                touchTimer = setTimeout(handleSelection, 300);
            });
        }

        function handleSelection() {
            const selection = window.getSelection();
            const text = selection.toString().trim();

            updateActionButtons(text);

            if (text.length > 0 && !selection.isCollapsed && editor && editor.contains(selection.anchorNode)) {
                let parent = selection.anchorNode.parentElement;
                let isInToken = false;
                while (parent && parent !== editor) {
                    if (parent.classList && (parent.classList.contains('token') || parent.classList.contains('choice-token'))) {
                        isInToken = true;
                        break;
                    }
                    parent = parent.parentElement;
                }
                
                if (isInToken) {
                    if (floater) floater.style.display = 'none';
                    return;
                }

                try {
                    const range = selection.getRangeAt(0);
                    const rect = range.getBoundingClientRect();
                    
                    const isMobile = window.innerWidth < 768;
                    const floaterWidth = isMobile ? 160 : 140;
                    
                    let left = rect.left + (rect.width / 2) - (floaterWidth / 2);
                    let top = rect.top + window.scrollY - (isMobile ? 55 : 45);
                    
                    if (left < 10) left = 10;
                    if (left + floaterWidth > window.innerWidth) {
                        left = window.innerWidth - floaterWidth - 10;
                    }
                    
                    if (floater) {
                        floater.style.display = 'block';
                        floater.style.top = `${top}px`;
                        floater.style.left = `${left}px`;
                        floater.textContent = 'Make Variable / Choices';
                        
                        const newFloater = floater.cloneNode(true);
                        floater.parentNode.replaceChild(newFloater, floater);
                        
                        newFloater.onclick = (e) => {
                            e.stopPropagation();
                            // Show quick menu
                            if (confirm('Click OK for Variable\nClick Cancel for Choices')) {
                                createVariable(text);
                            } else {
                                openChoicesModal(text);
                            }
                            newFloater.style.display = 'none';
                            window.getSelection().removeAllRanges();
                            updateActionButtons('');
                        };
                    }
                } catch (err) {
                    console.error('[TypeFill] Selection error:', err);
                }
            } else {
                if (floater) floater.style.display = 'none';
            }
        }

        function updateActionButtons(selectedText) {
            const hasSelection = selectedText && selectedText.trim().length > 0;
            
            ['makeVarBtn', 'mobileMakeVarBtn', 'makeChoicesBtn', 'mobileMakeChoicesBtn'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) {
                    if (hasSelection) {
                        btn.classList.add('ring-2', 'ring-offset-1');
                        if (id.includes('Var')) {
                            btn.classList.add('ring-emerald-400');
                        } else {
                            btn.classList.add('ring-amber-400');
                        }
                    } else {
                        btn.classList.remove('ring-2', 'ring-offset-1', 'ring-emerald-400', 'ring-amber-400');
                    }
                }
            });
        }

        function createVariable(selectedText) {
            const varId = 'var_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
            safeGlobalReplace(selectedText, varId);
            state.currentVariables.push({ 
                id: varId, 
                label: selectedText, 
                value: selectedText 
            });
            renderSidebar();
            updateActionButtons('');
        }

        function safeGlobalReplace(searchText, varId) {
            if (!editor) return;
            
            const walker = document.createTreeWalker(
                editor, 
                NodeFilter.SHOW_TEXT, 
                null, 
                false
            );
            
            const nodesToReplace = [];
            
            while (walker.nextNode()) {
                const node = walker.currentNode;
                if (node.nodeValue.includes(searchText)) {
                    let parent = node.parentElement;
                    let isInToken = false;
                    while (parent && parent !== editor) {
                        if (parent.classList && (parent.classList.contains('token') || parent.classList.contains('choice-token'))) {
                            isInToken = true;
                            break;
                        }
                        parent = parent.parentElement;
                    }
                    
                    if (!isInToken) {
                        nodesToReplace.push(node);
                    }
                }
            }
            
            nodesToReplace.forEach(node => {
                const fragment = document.createDocumentFragment();
                const parts = node.nodeValue.split(searchText);
                
                parts.forEach((part, index) => {
                    fragment.appendChild(document.createTextNode(part));
                    
                    if (index < parts.length - 1) {
                        const span = document.createElement('span');
                        span.className = 'token';
                        span.dataset.id = varId;
                        span.textContent = searchText;
                        fragment.appendChild(span);
                    }
                });
                
                if (node.parentNode) {
                    node.parentNode.replaceChild(fragment, node);
                }
            });
        }

        function renderSidebar() {
            if (!varContainer) return;
            
            varContainer.innerHTML = '';
            
            // Render Variables section
            if (state.currentVariables.length > 0) {
                const varSection = document.createElement('div');
                varSection.innerHTML = `<div class="text-xs font-bold text-emerald-600 uppercase mb-2 dark:text-emerald-400">Variables</div>`;
                
                state.currentVariables.forEach(v => {
                    const div = document.createElement('div');
                    div.className = 'bg-white p-3 rounded shadow-sm border border-gray-200 mb-2 dark:bg-slate-800 dark:border-slate-700';
                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-xs font-bold text-gray-500 uppercase truncate dark:text-gray-400" title="${v.label}">${v.label}</label>
                            <button onclick="deleteVariable('${v.id}')" class="text-xs text-red-400 hover:text-red-600 touch-btn p-1">Unlink</button>
                        </div>
                        <input type="text" value="${escapeHtml(v.value)}" 
                            oninput="updateVariable('${v.id}', this.value)" 
                            class="w-full bg-emerald-50 border border-emerald-200 text-gray-800 text-sm rounded px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition dark:bg-slate-700 dark:border-slate-600 dark:text-gray-200"
                            placeholder="Replacement...">
                    `;
                    varSection.appendChild(div);
                });
                
                varContainer.appendChild(varSection);
            }
            
            // Render Choices section
            if (state.currentChoices.length > 0) {
                const choiceSection = document.createElement('div');
                choiceSection.innerHTML = `<div class="text-xs font-bold text-amber-600 uppercase mb-2 mt-4 dark:text-amber-400">Choices</div>`;
                
                state.currentChoices.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'bg-amber-50 p-3 rounded shadow-sm border border-amber-200 mb-2 dark:bg-amber-900/30 dark:border-amber-800';
                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-xs font-bold text-amber-700 uppercase truncate dark:text-amber-400" title="${c.original}">${c.original}</label>
                            <button onclick="deleteChoice('${c.id}')" class="text-xs text-red-400 hover:text-red-600 touch-btn p-1">Unlink</button>
                        </div>
                        <div class="flex flex-wrap gap-1 mt-1">
                            ${c.options.map(opt => `
                                <span class="text-xs px-2 py-1 rounded ${opt === c.selected ? 'bg-amber-500 text-white' : 'bg-amber-100 text-amber-700 dark:bg-amber-900 dark:text-amber-300'}">
                                    ${escapeHtml(opt)}
                                </span>
                            `).join('')}
                        </div>
                    `;
                    choiceSection.appendChild(div);
                });
                
                varContainer.appendChild(choiceSection);
            }
            
            // Empty state
            if (state.currentVariables.length === 0 && state.currentChoices.length === 0) {
                varContainer.innerHTML = `
                    <div class="text-center mt-12 text-gray-400 dark:text-gray-500">
                        <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                        </svg>
                        <p class="text-sm">Highlight text to create</p>
                        <p class="text-xs mt-1">Variables or Choices</p>
                    </div>`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.updateVariable = function(id, newValue) {
            const tokens = document.querySelectorAll(`.token[data-id="${id}"]`);
            tokens.forEach(t => t.textContent = newValue);
            const v = state.currentVariables.find(x => x.id === id);
            if (v) v.value = newValue;
        };

        window.deleteVariable = function(id) {
            const tokens = document.querySelectorAll(`.token[data-id="${id}"]`);
            tokens.forEach(t => {
                const text = document.createTextNode(t.textContent);
                if (t.parentNode) {
                    t.parentNode.replaceChild(text, t);
                }
            });
            state.currentVariables = state.currentVariables.filter(x => x.id !== id);
            renderSidebar();
        };

        window.deleteChoice = function(id) {
            const tokens = document.querySelectorAll(`.choice-token[data-id="${id}"]`);
            const choice = state.currentChoices.find(c => c.id === id);
            
            tokens.forEach(t => {
                const text = document.createTextNode(choice?.original || t.textContent);
                if (t.parentNode) {
                    t.parentNode.replaceChild(text, t);
                }
            });
            
            state.currentChoices = state.currentChoices.filter(c => c.id !== id);
            renderSidebar();
            showToast('Choice removed');
        };

        // ==========================================
        // TEMPLATE MANAGEMENT
        // ==========================================
        
        window.saveCurrentTemplate = async function() {
            let name = "New Template";
            const currentT = state.templates.find(t => t.id === state.currentTemplateId);
            if (currentT) name = currentT.name;

            name = prompt("Template Name:", name);
            if (!name) return;

            const template = {
                id: state.currentTemplateId || Date.now().toString(),
                name: name,
                html: editor ? editor.innerHTML : '',
                variables: state.currentVariables,
                choices: state.currentChoices, // Save choices
                hashtags: state.currentHashtags,
                folderId: currentT ? currentT.folderId : undefined,
                updatedAt: Date.now()
            };

            const existingIndex = state.templates.findIndex(t => t.id === template.id);
            if (existingIndex >= 0) {
                state.templates[existingIndex] = template;
            } else {
                state.templates.push(template);
            }

            state.currentTemplateId = template.id;
            await persistState();
            renderTemplateList();
            showToast("Saved!");
            
            if (window.innerWidth < 768) {
                toggleSidebar();
            }
        };

        window.createNew = async function() {
            if ((state.currentVariables.length > 0 || state.currentChoices.length > 0) && !confirm("Clear current work?")) return;
            if (editor) editor.innerHTML = "";
            state.currentVariables = [];
            state.currentChoices = []; // Reset choices
            state.currentHashtags = [];
            state.currentTemplateId = null;
            renderSidebar();
            renderHashtags();
            renderTemplateList();
            if (editor) editor.focus();
        };

        window.loadTemplateUI = function(id) {
            const t = state.templates.find(x => x.id === id);
            if (!t) return;
            
            state.currentTemplateId = t.id;
            if (editor) {
                editor.innerHTML = t.html;
                
                // Re-attach click handlers for choice tokens
                const choiceTokens = editor.querySelectorAll('.choice-token');
                choiceTokens.forEach(token => {
                    token.onclick = (e) => showChoiceDropdown(e, token.dataset.id);
                });
            }
            
            state.currentVariables = t.variables || [];
            state.currentChoices = t.choices || []; // Load choices
            state.currentHashtags = t.hashtags || [];
            renderSidebar();
            renderHashtags();
            renderTemplateList();
        };

        window.removeTemplate = async function(id, e) {
            if (e) e.stopPropagation();
            if (!confirm("Delete this template?")) return;
            
            state.templates = state.templates.filter(t => t.id !== id);
            await persistState();
            
            if (state.currentTemplateId === id) {
                createNew();
            } else {
                renderTemplateList();
            }
        };

        function renderTemplateList() {
            if (!templateList) return;
            
            templateList.innerHTML = '';
            
            const closeAllContainer = document.getElementById('closeAllFoldersContainer');
            const foldersWithTemplates = state.folders.filter(f => 
                state.templates.some(t => t.folderId === f.id)
            );
            
            if (closeAllContainer) {
                if (foldersWithTemplates.length > 0) {
                    closeAllContainer.classList.remove('hidden');
                } else {
                    closeAllContainer.classList.add('hidden');
                }
            }
            
            state.folders.forEach(folder => {
                const folderTemplates = state.templates.filter(t => t.folderId === folder.id);
                if (folderTemplates.length === 0) return;
                
                const details = document.createElement('details');
                details.open = false;
                details.className = "group mb-2";

                const summary = document.createElement('summary');
                summary.className = "flex items-center justify-between text-xs font-bold text-gray-500 uppercase tracking-wider p-2 hover:bg-slate-100 rounded cursor-pointer select-none dark:text-gray-400 dark:hover:bg-slate-800";
                summary.innerHTML = `
                    <div class="flex items-center gap-2">
                        <svg class="arrow w-3 h-3 text-gray-400 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                        <span>${folder.name} <span class="text-gray-300 font-normal">(${folderTemplates.length})</span></span>
                    </div>
                    <button onclick="deleteFolder('${folder.id}', event)" class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 p-1">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                `;
                
                const listDiv = document.createElement('div');
                listDiv.className = "pl-2 border-l border-slate-200 ml-3 mt-1 space-y-1 dark:border-slate-700";
                folderTemplates.forEach(t => listDiv.appendChild(createTemplateItem(t)));
                
                details.appendChild(summary);
                details.appendChild(listDiv);
                templateList.appendChild(details);
            });

            const uncategorized = state.templates.filter(t => !t.folderId);
            if (uncategorized.length > 0) {
                const div = document.createElement('div');
                div.innerHTML = `<div class="px-2 py-1 mt-2 text-xs font-bold text-gray-400 uppercase tracking-wider dark:text-gray-500">Uncategorized</div>`;
                const listDiv = document.createElement('div');
                listDiv.className = "space-y-1";
                uncategorized.forEach(t => listDiv.appendChild(createTemplateItem(t)));
                div.appendChild(listDiv);
                templateList.appendChild(div);
            }
            
            if (state.templates.length === 0) {
                templateList.innerHTML = `
                    <div class="text-center mt-8 text-gray-400 dark:text-gray-500 p-4">
                        <p class="text-sm mb-2">No templates yet</p>
                        <p class="text-xs opacity-75">Create your first template</p>
                    </div>
                `;
            }
        }

        function createTemplateItem(t) {
            const isActive = state.currentTemplateId === t.id;
            const div = document.createElement('div');
            div.className = `group flex justify-between items-center p-2 rounded cursor-pointer transition select-none touch-btn ${
                isActive 
                ? 'bg-indigo-100 text-indigo-900 border border-indigo-200 dark:bg-indigo-900 dark:text-indigo-200 dark:border-indigo-800' 
                : 'hover:bg-slate-100 text-slate-600 dark:hover:bg-slate-800 dark:text-slate-300'
            }`;
            
            div.onclick = () => {
                loadTemplateUI(t.id);
                if (window.innerWidth < 768) toggleSidebar();
            };
            
            // Show counts
            let countsHtml = '';
            const varCount = t.variables?.length || 0;
            const choiceCount = t.choices?.length || 0;
            if (varCount > 0 || choiceCount > 0) {
                countsHtml = `<div class="flex gap-1 mt-1">`;
                if (varCount > 0) {
                    countsHtml += `<span class="text-xs bg-emerald-100 text-emerald-600 px-1.5 py-0.5 rounded dark:bg-emerald-900 dark:text-emerald-300">${varCount} var</span>`;
                }
                if (choiceCount > 0) {
                    countsHtml += `<span class="text-xs bg-amber-100 text-amber-600 px-1.5 py-0.5 rounded dark:bg-amber-900 dark:text-amber-300">${choiceCount} choice</span>`;
                }
                countsHtml += `</div>`;
            }
            
            // Show hashtags if available
            let hashtagsHtml = '';
            if (t.hashtags && t.hashtags.length > 0) {
                const displayTags = t.hashtags.slice(0, 2);
                hashtagsHtml = `<div class="flex gap-1 mt-1">${displayTags.map(tag => 
                    `<span class="text-xs bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded dark:bg-indigo-900 dark:text-indigo-300">#${tag}</span>`
                ).join('')}${t.hashtags.length > 2 ? `<span class="text-xs text-gray-400">+${t.hashtags.length - 2}</span>` : ''}</div>`;
            }
            
            div.innerHTML = `
                <div class="flex-1 min-w-0">
                    <span class="truncate text-sm font-medium block">${escapeHtml(t.name)}</span>
                    ${hashtagsHtml}
                    ${countsHtml}
                </div>
                <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick="moveTemplate('${t.id}', event)" title="Move" class="text-xs text-slate-400 hover:text-indigo-600 px-1 py-1 rounded hover:bg-white dark:hover:bg-slate-700">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z" />
                        </svg>
                    </button>
                    <button onclick="removeTemplate('${t.id}', event)" title="Delete" class="text-xs text-slate-400 hover:text-red-600 px-1 py-1 rounded hover:bg-white dark:hover:bg-slate-700">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            `;
            return div;
        }

        window.copyFinalText = function() {
            const btn = document.getElementById('copyBtn');
            if (!btn) return;
            
            const originalHTML = btn.innerHTML;
            
            if (!editor) return;
            const cleanText = editor.innerText;
            
            navigator.clipboard.writeText(cleanText).then(() => {
                btn.innerHTML = `<span class="font-bold">ok</span>`;
                btn.classList.remove('bg-indigo-600');
                btn.classList.add('bg-green-600');
                showToast("Copied to clipboard!");
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.add('bg-indigo-600');
                    btn.classList.remove('bg-green-600');
                }, 2000);
            }).catch(err => {
                console.error('[TypeFill] Copy failed:', err);
                showToast('Copy failed');
            });
        };

        window.showStatus = function(msg) {
            if (!statusInd) return;
            const original = statusInd.innerText;
            statusInd.innerText = msg;
            setTimeout(() => statusInd.innerText = "Ready", 3000);
        };

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveCurrentTemplate();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                e.preventDefault();
                toggleSearch();
            }
            if (e.key === 'Escape') {
                const searchModal = document.getElementById('searchModal');
                const choicesModal = document.getElementById('choicesModal');
                const dropdown = document.getElementById('choiceDropdown');
                
                if (searchModal && searchModal.classList.contains('open')) {
                    toggleSearch();
                }
                if (choicesModal && choicesModal.classList.contains('open')) {
                    closeChoicesModal();
                }
                if (dropdown && !dropdown.classList.contains('hidden')) {
                    dropdown.classList.add('hidden');
                }
            }
        });
    </script>
</body>
</html>
