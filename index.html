<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TypeFill Pro</title>
    <meta name="description" content="Create & Reuse Fill-in Templates with unlimited variables, choices, and privacy masks.">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="./icons/icon-180x180.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#4f46e5',
                            600: '#4338ca',
                            700: '#3730a3',
                            800: '#312e81',
                            900: '#1e1b4b',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --bg-primary: #0f0f14;
            --bg-secondary: #1a1a22;
            --bg-tertiary: #252530;
            --bg-card: #1e1e28;
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border-color: #2a2a35;
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        html, body {
            overscroll-behavior: none;
            touch-action: manipulation;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        
        /* Editor styling */
        #editor {
            min-height: 200px;
            outline: none;
            line-height: 1.7;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        #editor:focus {
            outline: none;
        }
        
        /* Token styling */
        .token, .choice-token, .masked-token {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            margin: 0 2px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .token {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border-color: rgba(99, 102, 241, 0.3);
        }
        
        .token:hover, .token:focus {
            background: rgba(99, 102, 241, 0.25);
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-1px);
        }
        
        .choice-token {
            background: rgba(16, 185, 129, 0.15);
            color: #6ee7b7;
            border-color: rgba(16, 185, 129, 0.3);
        }
        
        .choice-token:hover, .choice-token:focus {
            background: rgba(16, 185, 129, 0.25);
            border-color: rgba(16, 185, 129, 0.5);
            transform: translateY(-1px);
        }
        
        .masked-token {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border-color: rgba(239, 68, 68, 0.3);
        }
        
        .masked-token:hover, .masked-token:focus {
            background: rgba(239, 68, 68, 0.25);
            border-color: rgba(239, 68, 68, 0.5);
            transform: translateY(-1px);
        }
        
        /* Editor locked state */
        #editor.locked {
            background: rgba(0, 0, 0, 0.2);
            cursor: default;
        }
        
        #editor.locked * {
            user-select: none;
            -webkit-user-select: none;
        }
        
        #editor.locked .token,
        #editor.locked .choice-token,
        #editor.locked .masked-token {
            pointer-events: auto;
            cursor: pointer;
        }
        
        /* Folder nesting */
        .folder-nested {
            margin-left: 16px;
            border-left: 2px solid var(--border-color);
            padding-left: 8px;
        }
        
        /* Sidebar transitions */
        .sidebar {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sidebar.hidden-mobile {
            transform: translateX(-100%);
        }
        
        /* Animation classes */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        /* Button styles */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            outline: none;
        }
        
        .btn:focus-visible {
            ring: 2px;
            ring-offset: 2px;
            ring-color: var(--accent);
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--text-muted);
        }
        
        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
        }
        
        .btn-ghost:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        .btn-icon {
            padding: 8px;
            width: 36px;
            height: 36px;
        }
        
        /* Input styles */
        .input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s ease;
        }
        
        .input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .input::placeholder {
            color: var(--text-muted);
        }
        
        /* Dropdown menu */
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 100;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .dropdown-item {
            padding: 10px 14px;
            cursor: pointer;
            transition: background 0.15s ease;
            font-size: 14px;
        }
        
        .dropdown-item:hover {
            background: var(--bg-tertiary);
        }
        
        .dropdown-item.selected {
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent-hover);
        }
        
        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: fadeIn 0.2s ease-out;
        }
        
        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .toast {
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out;
            font-size: 14px;
        }
        
        /* Details/Summary for folders */
        details summary {
            list-style: none;
            cursor: pointer;
        }
        
        details summary::-webkit-details-marker {
            display: none;
        }
        
        details[open] .folder-chevron {
            transform: rotate(90deg);
        }
        
        .folder-chevron {
            transition: transform 0.2s ease;
        }
        
        /* Locked overlay indicator */
        .lock-indicator {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 10px;
            background: rgba(239, 68, 68, 0.2);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            color: #fca5a5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Quick action buttons */
        .quick-action {
            padding: 4px;
            border-radius: 4px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .quick-action:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 280px;
                z-index: 50;
            }
            
            .sidebar.hidden-mobile {
                transform: translateX(-100%);
            }
            
            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 40;
            }
        }
        
        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="bg-[#0f0f14] text-[#f0f0f5]">
    <!-- App Container -->
    <div id="app" class="flex h-screen h-[100dvh] overflow-hidden">
        
        <!-- Sidebar Overlay (Mobile) -->
        <div id="sidebarOverlay" class="sidebar-overlay hidden md:hidden" onclick="toggleSidebar()"></div>
        
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar hidden-mobile w-72 bg-[#1a1a22] border-r border-[#2a2a35] flex flex-col md:translate-x-0">
            <!-- Sidebar Header -->
            <div class="p-4 border-b border-[#2a2a35]">
                <div class="flex items-center justify-between mb-3">
                    <h1 class="text-lg font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                        TypeFill Pro
                    </h1>
                    <button onclick="toggleSidebar()" class="btn btn-ghost btn-icon md:hidden">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                
                <!-- Action Buttons -->
                <div class="flex gap-2 mb-3">
                    <button onclick="showCreateFolderModal()" class="btn btn-secondary flex-1 text-xs">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        </svg>
                        Folder
                    </button>
                    <button onclick="createNewTemplate()" class="btn btn-primary flex-1 text-xs">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Template
                    </button>
                </div>
                
                <!-- Folder Controls -->
                <div class="flex flex-col gap-2">
                    <button onclick="closeAllFolders()" class="btn btn-ghost text-xs w-full justify-start">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8"/>
                        </svg>
                        Close All Folders
                    </button>
                    <div class="flex gap-2">
                        <button onclick="sortFoldersAZ()" class="btn btn-ghost text-xs flex-1 justify-center" title="Sort A-Z">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9M3 12h5m4 0l4 4m0 0l4-4m-4 4V4"/>
                            </svg>
                            A-Z
                        </button>
                        <button onclick="sortFoldersZA()" class="btn btn-ghost text-xs flex-1 justify-center" title="Sort Z-A">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9M3 12h5m4 0l4-4m0 0l4 4m-4-4v12"/>
                            </svg>
                            Z-A
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Search -->
            <div class="p-3 border-b border-[#2a2a35]">
                <div class="relative">
                    <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-[#606070]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search templates..." class="input pl-10 text-sm" oninput="filterTemplates(this.value)">
                </div>
            </div>
            
            <!-- Template List -->
            <div id="templateList" class="flex-1 overflow-y-auto p-3">
                <!-- Templates will be rendered here -->
            </div>
            
            <!-- Sidebar Footer -->
            <div class="p-3 border-t border-[#2a2a35]">
                <button onclick="showImportModal()" class="btn btn-secondary w-full text-sm mb-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                    </svg>
                    Import JSON
                </button>
                <button onclick="exportData()" class="btn btn-ghost w-full text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    Export JSON
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Bar -->
            <header class="bg-[#1a1a22] border-b border-[#2a2a35] p-3">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <button onclick="toggleSidebar()" class="btn btn-ghost btn-icon md:hidden">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                            </svg>
                        </button>
                        <div>
                            <h2 id="currentTemplateName" class="font-semibold">New Template</h2>
                            <p id="currentFolderName" class="text-xs text-[#606070]">Select a folder</p>
                        </div>
                    </div>
                    
                    <!-- Editor Toolbar -->
                    <div class="flex items-center gap-2">
                        <!-- Lock/Unlock Button -->
                        <button id="lockBtn" onclick="toggleEditorLock()" class="btn btn-secondary text-xs" title="Lock/Unlock Editor">
                            <svg id="lockIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0v4M5 15h14a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
                            </svg>
                            <span id="lockLabel">Lock</span>
                        </button>
                        
                        <!-- Clear Text -->
                        <button onclick="clearEditorText()" class="btn btn-ghost btn-icon" title="Clear Text">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                        
                        <!-- Paste Text -->
                        <button onclick="pasteEditorText()" class="btn btn-ghost btn-icon" title="Paste Text">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                            </svg>
                        </button>
                        
                        <!-- Save Button -->
                        <button onclick="saveCurrentTemplate()" class="btn btn-primary text-xs">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                            Save
                        </button>
                    </div>
                </div>
                
                <!-- Token Action Buttons (Hidden when locked) -->
                <div id="tokenActionButtons" class="flex items-center gap-2 mt-3 pt-3 border-t border-[#2a2a35]">
                    <button onclick="makeVariable()" class="btn btn-secondary text-xs">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                        </svg>
                        Make Variable
                    </button>
                    <button onclick="makeChoice()" class="btn btn-secondary text-xs">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l4-4 4 4m0 6l-4 4-4-4"/>
                        </svg>
                        Make Choices
                    </button>
                    <button onclick="applyPrivacyMask()" class="btn btn-secondary text-xs">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                        </svg>
                        Apply Privacy
                    </button>
                </div>
            </header>
            
            <!-- Editor Area -->
            <div class="flex-1 flex overflow-hidden">
                <!-- Main Editor -->
                <div class="flex-1 flex flex-col overflow-hidden">
                    <div class="flex-1 p-4 overflow-y-auto relative">
                        <div id="lockIndicator" class="lock-indicator hidden">LOCKED</div>
                        <div id="editor" contenteditable="true" class="bg-[#252530] rounded-xl p-4 min-h-full border border-[#2a2a35] text-[#f0f0f5]">
                            <p>Start typing your template here...</p>
                        </div>
                    </div>
                    
                    <!-- Hashtags -->
                    <div class="p-3 border-t border-[#2a2a35] bg-[#1a1a22]">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="text-xs text-[#606070]">Hashtags:</span>
                            <div id="hashtagsContainer" class="flex flex-wrap gap-1">
                                <!-- Hashtags rendered here -->
                            </div>
                            <button onclick="addHashtag()" class="btn btn-ghost text-xs">+ Add Tag</button>
                        </div>
                    </div>
                </div>
                
                <!-- Variables Sidebar -->
                <aside id="variablesSidebar" class="w-72 bg-[#1a1a22] border-l border-[#2a2a35] flex flex-col overflow-hidden hidden md:flex">
                    <div class="p-3 border-b border-[#2a2a35]">
                        <h3 class="font-semibold text-sm">Variables & Choices</h3>
                    </div>
                    
                    <div id="variablesContainer" class="flex-1 overflow-y-auto p-3">
                        <!-- Variables will be rendered here -->
                    </div>
                    
                    <!-- Copy Output -->
                    <div class="p-3 border-t border-[#2a2a35]">
                        <button onclick="copyFilledOutput()" class="btn btn-primary w-full text-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                            </svg>
                            Copy Filled Output
                        </button>
                    </div>
                </aside>
            </div>
        </main>
    </div>
    
    <!-- Modals Container -->
    <div id="modalsContainer"></div>
    
    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script>
        // ============================================
        // TYPEFILL PRO - MAIN APPLICATION v5.2.0
        // ============================================
        
        const APP_VERSION = '5.2.0';
        const DB_NAME = 'TypeFillProDB';
        const DB_VERSION = 2;
        
        // ============================================
        // STATE MANAGEMENT
        // ============================================
        
        let state = {
            folders: [],
            templates: [],
            currentTemplate: null,
            isEditorLocked: false,
            currentVariables: [],
            currentChoices: [],
            currentMasks: []
        };
        
        // ============================================
        // INDEXEDDB SETUP
        // ============================================
        
        let db = null;
        
        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    
                    if (!database.objectStoreNames.contains('data')) {
                        database.createObjectStore('data', { keyPath: 'id' });
                    }
                };
            });
        }
        
        async function persistState() {
            if (!db) return;
            
            const transaction = db.transaction(['data'], 'readwrite');
            const store = transaction.objectStore('data');
            
            await store.put({
                id: 'main',
                folders: state.folders,
                templates: state.templates
            });
        }
        
        async function loadState() {
            if (!db) return;
            
            const transaction = db.transaction(['data'], 'readonly');
            const store = transaction.objectStore('data');
            const request = store.get('main');
            
            return new Promise((resolve) => {
                request.onsuccess = () => {
                    if (request.result) {
                        state.folders = request.result.folders || [];
                        state.templates = request.result.templates || [];
                    }
                    resolve();
                };
                request.onerror = () => resolve();
            });
        }
        
        // ============================================
        // BACKWARD COMPATIBILITY - JSON IMPORT
        // ============================================
        
        async function importLegacyJSON(jsonData) {
            try {
                // Handle both new and legacy formats
                if (jsonData.folders) {
                    // Legacy format with folders array
                    state.folders = jsonData.folders.map(f => ({
                        id: f.id || generateId(),
                        name: f.name || 'Unnamed Folder',
                        parentId: f.parentId || null,
                        createdAt: f.createdAt || Date.now()
                    }));
                }
                
                if (jsonData.templates) {
                    state.templates = jsonData.templates.map(t => ({
                        id: t.id || generateId(),
                        name: t.name || 'Unnamed Template',
                        html: t.html || '',
                        variables: t.variables || [],
                        choices: t.choices || [],
                        maskedVariables: t.maskedVariables || [],
                        hashtags: t.hashtags || [],
                        folderId: t.folderId || null,
                        updatedAt: t.updatedAt || Date.now()
                    }));
                }
                
                await persistState();
                renderTemplateList();
                showToast('Data imported successfully', 'success');
            } catch (error) {
                showToast('Failed to import data', 'error');
                console.error('Import error:', error);
            }
        }
        
        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        
        function generateId() {
            return `${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        }
        
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? 'border-green-500' : type === 'error' ? 'border-red-500' : 'border-indigo-500'}`;
            toast.innerHTML = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // ============================================
        // SIDEBAR TOGGLE
        // ============================================
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            sidebar.classList.toggle('hidden-mobile');
            overlay.classList.toggle('hidden');
        }
        
        // ============================================
        // EDITOR LOCK/UNLOCK MECHANISM
        // ============================================
        
        function toggleEditorLock() {
            state.isEditorLocked = !state.isEditorLocked;
            updateEditorLockState();
        }
        
        function updateEditorLockState() {
            const editor = document.getElementById('editor');
            const lockBtn = document.getElementById('lockBtn');
            const lockIcon = document.getElementById('lockIcon');
            const lockLabel = document.getElementById('lockLabel');
            const lockIndicator = document.getElementById('lockIndicator');
            const tokenButtons = document.getElementById('tokenActionButtons');
            
            if (state.isEditorLocked) {
                editor.setAttribute('contenteditable', 'false');
                editor.classList.add('locked');
                lockBtn.classList.remove('btn-secondary');
                lockBtn.classList.add('bg-red-500/20', 'text-red-400', 'border', 'border-red-500/30');
                lockIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>`;
                lockLabel.textContent = 'Unlock';
                lockIndicator.classList.remove('hidden');
                tokenButtons.classList.add('hidden');
            } else {
                editor.setAttribute('contenteditable', 'true');
                editor.classList.remove('locked');
                lockBtn.classList.add('btn-secondary');
                lockBtn.classList.remove('bg-red-500/20', 'text-red-400', 'border', 'border-red-500/30');
                lockIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0v4M5 15h14a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>`;
                lockLabel.textContent = 'Lock';
                lockIndicator.classList.add('hidden');
                tokenButtons.classList.remove('hidden');
            }
        }
        
        // ============================================
        // QUICK ACTIONS - EDITOR
        // ============================================
        
        function clearEditorText() {
            if (confirm('Clear all text in the editor?')) {
                document.getElementById('editor').innerHTML = '<p></p>';
                state.currentVariables = [];
                state.currentChoices = [];
                state.currentMasks = [];
                renderVariablesPanel();
            }
        }
        
        async function pasteEditorText() {
            try {
                const text = await navigator.clipboard.readText();
                document.execCommand('insertText', false, text);
            } catch (err) {
                showToast('Failed to paste from clipboard', 'error');
            }
        }
        
        // ============================================
        // QUICK ACTIONS - VARIABLES
        // ============================================
        
        function clearVariableInput(varId) {
            const input = document.querySelector(`input[data-var-id="${varId}"]`);
            if (input) {
                input.value = '';
                updateVariable(varId, '');
            }
        }
        
        async function pasteToVariableInput(varId) {
            try {
                const text = await navigator.clipboard.readText();
                const input = document.querySelector(`input[data-var-id="${varId}"]`);
                if (input) {
                    input.value = text;
                    updateVariable(varId, text);
                }
            } catch (err) {
                showToast('Failed to paste from clipboard', 'error');
            }
        }
        
        // ============================================
        // FOLDER MANAGEMENT
        // ============================================
        
        function showCreateFolderModal(parentId = null) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content p-5">
                    <h3 class="text-lg font-semibold mb-4">${parentId ? 'Create Sub-Folder' : 'Create New Folder'}</h3>
                    <input type="text" id="folderNameInput" class="input mb-4" placeholder="Folder name...">
                    <div class="flex gap-2 justify-end">
                        <button onclick="this.closest('.modal-overlay').remove()" class="btn btn-secondary">Cancel</button>
                        <button onclick="createFolder('${parentId || ''}')" class="btn btn-primary">Create</button>
                    </div>
                </div>
            `;
            document.getElementById('modalsContainer').appendChild(modal);
            document.getElementById('folderNameInput').focus();
        }
        
        async function createFolder(parentId = null) {
            const name = document.getElementById('folderNameInput').value.trim();
            if (!name) {
                showToast('Please enter a folder name', 'error');
                return;
            }
            
            const folder = {
                id: `folder_${Date.now()}`,
                name: name,
                parentId: parentId || null,
                createdAt: Date.now()
            };
            
            state.folders.push(folder);
            await persistState();
            renderTemplateList();
            
            document.querySelector('.modal-overlay').remove();
            showToast('Folder created', 'success');
        }
        
        // ============================================
        // FOLDER SORTING
        // ============================================
        
        async function sortFoldersAZ() {
            // Only sort root folders, then sort children within
            const rootFolders = state.folders.filter(f => !f.parentId);
            const childFolders = state.folders.filter(f => f.parentId);
            
            rootFolders.sort((a, b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()));
            
            // Sort children by parent
            childFolders.sort((a, b) => {
                const parentCompare = (a.parentId || '').localeCompare(b.parentId || '');
                if (parentCompare !== 0) return parentCompare;
                return a.name.toLowerCase().localeCompare(b.name.toLowerCase());
            });
            
            // Rebuild array: roots first (with their children following)
            state.folders = [];
            rootFolders.forEach(root => {
                state.folders.push(root);
                const children = childFolders.filter(c => c.parentId === root.id);
                children.sort((a, b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()));
                state.folders.push(...children);
            });
            
            // Add any orphaned children
            const orphanedChildren = childFolders.filter(c => !rootFolders.find(r => r.id === c.parentId));
            state.folders.push(...orphanedChildren);
            
            await persistState();
            renderTemplateList();
            showToast('Folders sorted A-Z', 'success');
        }
        
        async function sortFoldersZA() {
            const rootFolders = state.folders.filter(f => !f.parentId);
            const childFolders = state.folders.filter(f => f.parentId);
            
            rootFolders.sort((a, b) => b.name.toLowerCase().localeCompare(a.name.toLowerCase()));
            
            childFolders.sort((a, b) => {
                const parentCompare = (a.parentId || '').localeCompare(b.parentId || '');
                if (parentCompare !== 0) return parentCompare;
                return b.name.toLowerCase().localeCompare(a.name.toLowerCase());
            });
            
            state.folders = [];
            rootFolders.forEach(root => {
                state.folders.push(root);
                const children = childFolders.filter(c => c.parentId === root.id);
                children.sort((a, b) => b.name.toLowerCase().localeCompare(a.name.toLowerCase()));
                state.folders.push(...children);
            });
            
            const orphanedChildren = childFolders.filter(c => !rootFolders.find(r => r.id === c.parentId));
            state.folders.push(...orphanedChildren);
            
            await persistState();
            renderTemplateList();
            showToast('Folders sorted Z-A', 'success');
        }
        
        // ============================================
        // CLOSE ALL FOLDERS
        // ============================================
        
        function closeAllFolders() {
            const details = document.querySelectorAll('#templateList details');
            details.forEach(d => d.removeAttribute('open'));
        }
        
        // ============================================
        // TEMPLATE LIST RENDERING (WITH SUB-FOLDERS)
        // ============================================
        
        function renderTemplateList() {
            const container = document.getElementById('templateList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            // Filter templates by search
            const filteredTemplates = searchTerm 
                ? state.templates.filter(t => t.name.toLowerCase().includes(searchTerm))
                : state.templates;
            
            // Build folder tree
            function buildFolderTree(parentId = null, depth = 0) {
                const folders = state.folders.filter(f => f.parentId === parentId);
                let html = '';
                
                folders.forEach(folder => {
                    const folderTemplates = filteredTemplates.filter(t => t.folderId === folder.id);
                    const childFolders = state.folders.filter(f => f.parentId === folder.id);
                    const hasChildren = folderTemplates.length > 0 || childFolders.length > 0;
                    
                    html += `
                        <details class="mb-1 ${depth > 0 ? 'folder-nested' : ''}" open>
                            <summary class="flex items-center justify-between p-2 rounded-lg hover:bg-[#252530] cursor-pointer group">
                                <div class="flex items-center gap-2">
                                    <svg class="folder-chevron w-4 h-4 text-[#606070]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                                    </svg>
                                    <svg class="w-4 h-4 text-amber-400" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M3 7V17C3 18.1046 3.89543 19 5 19H19C20.1046 19 21 18.1046 21 17V9C21 7.89543 20.1046 7 19 7H13L11 5H5C3.89543 5 3 5.89543 3 7Z"/>
                                    </svg>
                                    <span class="font-medium text-sm">${escapeHtml(folder.name)}</span>
                                    <span class="text-xs text-[#606070]">(${folderTemplates.length})</span>
                                </div>
                                <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onclick="event.stopPropagation(); showCreateFolderModal('${folder.id}')" class="quick-action" title="Add Sub-Folder">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                        </svg>
                                    </button>
                                    <button onclick="event.stopPropagation(); deleteFolder('${folder.id}')" class="quick-action text-red-400" title="Delete Folder">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                        </svg>
                                    </button>
                                </div>
                            </summary>
                            <div class="mt-1 ml-4">
                                ${buildFolderTree(folder.id, depth + 1)}
                                ${folderTemplates.map(t => renderTemplateItem(t)).join('')}
                            </div>
                        </details>
                    `;
                });
                
                return html;
            }
            
            // Render uncategorized templates
            const uncategorizedTemplates = filteredTemplates.filter(t => !t.folderId);
            let uncategorizedHtml = '';
            
            if (uncategorizedTemplates.length > 0) {
                uncategorizedHtml = `
                    <details class="mb-1" open>
                        <summary class="flex items-center gap-2 p-2 rounded-lg hover:bg-[#252530] cursor-pointer">
                            <svg class="folder-chevron w-4 h-4 text-[#606070]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                            <svg class="w-4 h-4 text-[#606070]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8"/>
                            </svg>
                            <span class="font-medium text-sm text-[#606070]">Uncategorized</span>
                            <span class="text-xs text-[#606070]">(${uncategorizedTemplates.length})</span>
                        </summary>
                        <div class="mt-1 ml-4">
                            ${uncategorizedTemplates.map(t => renderTemplateItem(t)).join('')}
                        </div>
                    </details>
                `;
            }
            
            container.innerHTML = buildFolderTree() + uncategorizedHtml;
        }
        
        function renderTemplateItem(template) {
            const isActive = state.currentTemplate && state.currentTemplate.id === template.id;
            return `
                <div class="flex items-center justify-between p-2 rounded-lg cursor-pointer group ${isActive ? 'bg-indigo-500/20 text-indigo-300' : 'hover:bg-[#252530]'}" onclick="loadTemplate('${template.id}')">
                    <div class="flex items-center gap-2 overflow-hidden">
                        <svg class="w-4 h-4 text-[#606070] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <span class="text-sm truncate">${escapeHtml(template.name)}</span>
                    </div>
                    <button onclick="event.stopPropagation(); deleteTemplate('${template.id}')" class="quick-action opacity-0 group-hover:opacity-100 text-red-400" title="Delete">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============================================
        // TEMPLATE MANAGEMENT
        // ============================================
        
        function createNewTemplate() {
            state.currentTemplate = {
                id: generateId(),
                name: 'New Template',
                html: '',
                variables: [],
                choices: [],
                maskedVariables: [],
                hashtags: [],
                folderId: null,
                updatedAt: Date.now()
            };
            
            document.getElementById('editor').innerHTML = '<p></p>';
            document.getElementById('currentTemplateName').textContent = 'New Template';
            document.getElementById('currentFolderName').textContent = 'Select a folder';
            document.getElementById('editor').focus();
            
            state.currentVariables = [];
            state.currentChoices = [];
            state.currentMasks = [];
            renderVariablesPanel();
        }
        
        async function loadTemplate(templateId) {
            const template = state.templates.find(t => t.id === templateId);
            if (!template) return;
            
            state.currentTemplate = { ...template };
            document.getElementById('editor').innerHTML = template.html;
            document.getElementById('currentTemplateName').textContent = template.name;
            
            const folder = state.folders.find(f => f.id === template.folderId);
            document.getElementById('currentFolderName').textContent = folder ? folder.name : 'Uncategorized';
            
            state.currentVariables = [...(template.variables || [])];
            state.currentChoices = [...(template.choices || [])];
            state.currentMasks = [...(template.maskedVariables || [])];
            
            renderVariablesPanel();
            renderHashtags();
        }
        
        async function saveCurrentTemplate() {
            if (!state.currentTemplate) {
                createNewTemplate();
                return;
            }
            
            // Extract variables and choices from editor HTML
            extractTokensFromEditor();
            
            state.currentTemplate.html = document.getElementById('editor').innerHTML;
            state.currentTemplate.variables = state.currentVariables;
            state.currentTemplate.choices = state.currentChoices;
            state.currentTemplate.maskedVariables = state.currentMasks;
            state.currentTemplate.updatedAt = Date.now();
            
            const existingIndex = state.templates.findIndex(t => t.id === state.currentTemplate.id);
            if (existingIndex >= 0) {
                state.templates[existingIndex] = state.currentTemplate;
            } else {
                state.templates.push(state.currentTemplate);
            }
            
            await persistState();
            renderTemplateList();
            showToast('Template saved', 'success');
        }
        
        function extractTokensFromEditor() {
            const editor = document.getElementById('editor');
            const tokens = editor.querySelectorAll('.token');
            const choiceTokens = editor.querySelectorAll('.choice-token');
            const maskedTokens = editor.querySelectorAll('.masked-token');
            
            // Extract variables
            tokens.forEach(token => {
                const id = token.dataset.id;
                const label = token.textContent;
                if (!state.currentVariables.find(v => v.id === id)) {
                    state.currentVariables.push({
                        id: id || `var_${Date.now()}`,
                        label: label,
                        value: label
                    });
                }
            });
            
            // Extract choices
            choiceTokens.forEach(token => {
                const id = token.dataset.id;
                const selected = token.textContent;
                const options = JSON.parse(token.dataset.options || '[]');
                if (!state.currentChoices.find(c => c.id === id)) {
                    state.currentChoices.push({
                        id: id || `choice_${Date.now()}`,
                        original: options[0] || selected,
                        options: options.length > 0 ? options : [selected],
                        selected: selected
                    });
                }
            });
            
            // Extract masks
            maskedTokens.forEach(token => {
                const id = token.dataset.id;
                if (!state.currentMasks.find(m => m.id === id)) {
                    state.currentMasks.push({
                        id: id || `mask_${Date.now()}`,
                        value: token.textContent
                    });
                }
            });
        }
        
        async function deleteTemplate(templateId) {
            if (!confirm('Delete this template?')) return;
            
            state.templates = state.templates.filter(t => t.id !== templateId);
            
            if (state.currentTemplate && state.currentTemplate.id === templateId) {
                state.currentTemplate = null;
                document.getElementById('editor').innerHTML = '<p></p>';
                document.getElementById('currentTemplateName').textContent = 'New Template';
            }
            
            await persistState();
            renderTemplateList();
            showToast('Template deleted', 'success');
        }
        
        async function deleteFolder(folderId) {
            if (!confirm('Delete this folder and all its contents?')) return;
            
            // Delete folder and all sub-folders
            const folderIdsToDelete = [folderId];
            let foundNew = true;
            while (foundNew) {
                foundNew = false;
                state.folders.forEach(f => {
                    if (f.parentId && folderIdsToDelete.includes(f.parentId) && !folderIdsToDelete.includes(f.id)) {
                        folderIdsToDelete.push(f.id);
                        foundNew = true;
                    }
                });
            }
            
            state.folders = state.folders.filter(f => !folderIdsToDelete.includes(f.id));
            state.templates = state.templates.filter(t => !folderIdsToDelete.includes(t.folderId));
            
            await persistState();
            renderTemplateList();
            showToast('Folder deleted', 'success');
        }
        
        // ============================================
        // VARIABLE OPERATIONS
        // ============================================
        
        function makeVariable() {
            const selection = window.getSelection();
            if (!selection.rangeCount || selection.isCollapsed) {
                showToast('Select text to make a variable', 'error');
                return;
            }
            
            const range = selection.getRangeAt(0);
            const text = selection.toString().trim();
            
            if (!text) return;
            
            const varId = `var_${Date.now()}_${Math.random().toString(36).substr(2, 3)}`;
            const token = document.createElement('span');
            token.className = 'token';
            token.dataset.id = varId;
            token.textContent = text;
            token.setAttribute('contenteditable', 'false');
            token.onclick = () => focusVariable(varId);
            
            range.deleteContents();
            range.insertNode(token);
            
            state.currentVariables.push({
                id: varId,
                label: text,
                value: text
            });
            
            renderVariablesPanel();
            selection.removeAllRanges();
        }
        
        function makeChoice() {
            const selection = window.getSelection();
            if (!selection.rangeCount || selection.isCollapsed) {
                showToast('Select text to make a choice', 'error');
                return;
            }
            
            const range = selection.getRangeAt(0);
            const text = selection.toString().trim();
            
            if (!text) return;
            
            const choiceId = `choice_${Date.now()}_${Math.random().toString(36).substr(2, 3)}`;
            const token = document.createElement('span');
            token.className = 'choice-token';
            token.dataset.id = choiceId;
            token.dataset.options = JSON.stringify([text]);
            token.textContent = text;
            token.setAttribute('contenteditable', 'false');
            token.onclick = (e) => showChoiceDropdown(e, choiceId);
            
            range.deleteContents();
            range.insertNode(token);
            
            state.currentChoices.push({
                id: choiceId,
                original: text,
                options: [text],
                selected: text
            });
            
            renderVariablesPanel();
            selection.removeAllRanges();
        }
        
        function applyPrivacyMask() {
            const selection = window.getSelection();
            if (!selection.rangeCount || selection.isCollapsed) {
                showToast('Select text to mask', 'error');
                return;
            }
            
            const range = selection.getRangeAt(0);
            const text = selection.toString().trim();
            
            if (!text) return;
            
            const maskId = `mask_${Date.now()}_${Math.random().toString(36).substr(2, 3)}`;
            const token = document.createElement('span');
            token.className = 'masked-token';
            token.dataset.id = maskId;
            token.textContent = text;
            token.setAttribute('contenteditable', 'false');
            
            range.deleteContents();
            range.insertNode(token);
            
            state.currentMasks.push({
                id: maskId,
                value: text
            });
            
            selection.removeAllRanges();
        }
        
        // ============================================
        // VARIABLES PANEL RENDERING
        // ============================================
        
        function renderVariablesPanel() {
            const container = document.getElementById('variablesContainer');
            let html = '';
            
            // Variables Section
            if (state.currentVariables.length > 0) {
                html += `
                    <div class="mb-4">
                        <h4 class="text-xs font-semibold text-[#606070] uppercase tracking-wider mb-2">Variables</h4>
                        <div class="space-y-2">
                `;
                
                state.currentVariables.forEach(v => {
                    html += `
                        <div class="bg-[#252530] rounded-lg p-2">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-xs font-medium text-indigo-400">${escapeHtml(v.label)}</span>
                                <div class="flex gap-1">
                                    <button onclick="clearVariableInput('${v.id}')" class="quick-action" title="Clear">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                        </svg>
                                    </button>
                                    <button onclick="pasteToVariableInput('${v.id}')" class="quick-action" title="Paste">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <input type="text" data-var-id="${v.id}" value="${escapeHtml(v.value || '')}" 
                                class="input text-sm" placeholder="Enter value..."
                                oninput="updateVariable('${v.id}', this.value)">
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            }
            
            // Choices Section
            if (state.currentChoices.length > 0) {
                html += `
                    <div class="mb-4">
                        <h4 class="text-xs font-semibold text-[#606070] uppercase tracking-wider mb-2">Choices</h4>
                        <div class="space-y-2">
                `;
                
                state.currentChoices.forEach(c => {
                    html += `
                        <div class="bg-[#252530] rounded-lg p-2">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-xs font-medium text-emerald-400">${escapeHtml(c.original)}</span>
                            </div>
                            <div class="flex flex-wrap gap-1">
                                ${c.options.map(opt => `
                                    <button onclick="selectChoice('${c.id}', '${escapeHtml(opt)}')" 
                                        class="px-2 py-1 rounded text-xs ${c.selected === opt ? 'bg-emerald-500/30 text-emerald-300' : 'bg-[#1a1a22] text-[#606070] hover:bg-emerald-500/20'}">
                                        ${escapeHtml(opt)}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            }
            
            // Empty state
            if (state.currentVariables.length === 0 && state.currentChoices.length === 0) {
                html = `
                    <div class="empty-state py-8">
                        <svg class="w-12 h-12 text-[#606070] mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                        </svg>
                        <p class="text-sm text-[#606070]">No variables or choices yet</p>
                        <p class="text-xs text-[#606070] mt-1">Select text and use the buttons above</p>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        // ============================================
        // VARIABLE/CHOICE INTERACTIONS
        // ============================================
        
        function focusVariable(varId) {
            const input = document.querySelector(`input[data-var-id="${varId}"]`);
            if (input) {
                input.focus();
                input.select();
            }
        }
        
        function updateVariable(varId, value) {
            const variable = state.currentVariables.find(v => v.id === varId);
            if (variable) {
                variable.value = value;
                
                // Update all tokens with this ID in the editor
                const tokens = document.querySelectorAll(`.token[data-id="${varId}"]`);
                tokens.forEach(token => {
                    token.textContent = value || variable.label;
                });
            }
        }
        
        function selectChoice(choiceId, value) {
            const choice = state.currentChoices.find(c => c.id === choiceId);
            if (choice) {
                choice.selected = value;
                
                // Update all choice tokens with this ID in the editor
                const tokens = document.querySelectorAll(`.choice-token[data-id="${choiceId}"]`);
                tokens.forEach(token => {
                    token.textContent = value;
                });
                
                renderVariablesPanel();
            }
        }
        
        function showChoiceDropdown(event, choiceId) {
            event.stopPropagation();
            const choice = state.currentChoices.find(c => c.id === choiceId);
            if (!choice) return;
            
            // Remove existing dropdown
            const existing = document.querySelector('.choice-dropdown');
            if (existing) existing.remove();
            
            const dropdown = document.createElement('div');
            dropdown.className = 'choice-dropdown dropdown-menu';
            dropdown.innerHTML = choice.options.map(opt => `
                <div class="dropdown-item ${choice.selected === opt ? 'selected' : ''}" onclick="selectChoice('${choiceId}', '${escapeHtml(opt)}'); this.closest('.choice-dropdown').remove();">
                    ${escapeHtml(opt)}
                </div>
            `).join('');
            
            const rect = event.target.getBoundingClientRect();
            dropdown.style.position = 'fixed';
            dropdown.style.top = `${rect.bottom + 5}px`;
            dropdown.style.left = `${rect.left}px`;
            dropdown.style.width = 'auto';
            dropdown.style.minWidth = '120px';
            
            document.body.appendChild(dropdown);
            
            // Close on outside click
            setTimeout(() => {
                document.addEventListener('click', function closeDropdown(e) {
                    if (!dropdown.contains(e.target)) {
                        dropdown.remove();
                        document.removeEventListener('click', closeDropdown);
                    }
                });
            }, 0);
        }
        
        // ============================================
        // HASHTAGS
        // ============================================
        
        function renderHashtags() {
            const container = document.getElementById('hashtagsContainer');
            if (!state.currentTemplate) {
                container.innerHTML = '';
                return;
            }
            
            const tags = state.currentTemplate.hashtags || [];
            container.innerHTML = tags.map(tag => `
                <span class="inline-flex items-center gap-1 px-2 py-0.5 bg-indigo-500/20 text-indigo-300 rounded text-xs">
                    #${escapeHtml(tag)}
                    <button onclick="removeHashtag('${escapeHtml(tag)}')" class="hover:text-white">×</button>
                </span>
            `).join('');
        }
        
        function addHashtag() {
            const tag = prompt('Enter hashtag (without #):');
            if (!tag || !tag.trim()) return;
            
            if (!state.currentTemplate) createNewTemplate();
            
            if (!state.currentTemplate.hashtags) {
                state.currentTemplate.hashtags = [];
            }
            
            const cleanTag = tag.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!state.currentTemplate.hashtags.includes(cleanTag)) {
                state.currentTemplate.hashtags.push(cleanTag);
                renderHashtags();
            }
        }
        
        function removeHashtag(tag) {
            if (!state.currentTemplate || !state.currentTemplate.hashtags) return;
            state.currentTemplate.hashtags = state.currentTemplate.hashtags.filter(t => t !== tag);
            renderHashtags();
        }
        
        // ============================================
        // IMPORT/EXPORT
        // ============================================
        
        function showImportModal() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content p-5">
                    <h3 class="text-lg font-semibold mb-4">Import Data</h3>
                    <div class="mb-4">
                        <label class="block text-sm text-[#606070] mb-2">Select JSON file or paste content:</label>
                        <input type="file" id="importFile" accept=".json" class="input text-sm mb-2" onchange="handleImportFile(this)">
                        <textarea id="importText" class="input h-32 text-sm" placeholder="Or paste JSON here..."></textarea>
                    </div>
                    <div class="flex gap-2 justify-end">
                        <button onclick="this.closest('.modal-overlay').remove()" class="btn btn-secondary">Cancel</button>
                        <button onclick="handleImportText()" class="btn btn-primary">Import</button>
                    </div>
                </div>
            `;
            document.getElementById('modalsContainer').appendChild(modal);
        }
        
        function handleImportFile(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('importText').value = e.target.result;
            };
            reader.readAsText(file);
        }
        
        async function handleImportText() {
            const text = document.getElementById('importText').value.trim();
            if (!text) {
                showToast('Please enter or select JSON data', 'error');
                return;
            }
            
            try {
                const data = JSON.parse(text);
                await importLegacyJSON(data);
                document.querySelector('.modal-overlay').remove();
            } catch (err) {
                showToast('Invalid JSON format', 'error');
            }
        }
        
        function exportData() {
            const exportObj = {
                app: 'TypeFill',
                version: APP_VERSION,
                exportDate: new Date().toISOString(),
                folders: state.folders,
                templates: state.templates
            };
            
            const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `typefill_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            
            URL.revokeObjectURL(url);
            showToast('Data exported', 'success');
        }
        
        // ============================================
        // COPY FILLED OUTPUT
        // ============================================
        
        async function copyFilledOutput() {
            const editor = document.getElementById('editor');
            let output = editor.innerHTML;
            
            // Replace variable tokens with their values
            state.currentVariables.forEach(v => {
                const regex = new RegExp(`<span[^>]*class="token"[^>]*data-id="${v.id}"[^>]*>[^<]*</span>`, 'g');
                output = output.replace(regex, v.value || v.label);
            });
            
            // Replace choice tokens with selected values
            state.currentChoices.forEach(c => {
                const regex = new RegExp(`<span[^>]*class="choice-token"[^>]*data-id="${c.id}"[^>]*>[^<]*</span>`, 'g');
                output = output.replace(regex, c.selected);
            });
            
            // Replace masked tokens with asterisks
            output = output.replace(/<span[^>]*class="masked-token"[^>]*>([^<]*)<\/span>/g, '***');
            
            // Convert HTML to plain text
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = output;
            const plainText = tempDiv.textContent || tempDiv.innerText;
            
            try {
                await navigator.clipboard.writeText(plainText);
                showToast('Output copied to clipboard', 'success');
            } catch (err) {
                showToast('Failed to copy', 'error');
            }
        }
        
        // ============================================
        // SEARCH/FILTER
        // ============================================
        
        function filterTemplates(term) {
            renderTemplateList();
        }
        
        // ============================================
        // SERVICE WORKER
        // ============================================
        
        async function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.register('./sw.js');
                    console.log('Service Worker registered:', registration.scope);
                    
                    // Check for updates
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showToast('Update available! Refresh to apply.', 'info');
                            }
                        });
                    });
                } catch (err) {
                    console.log('Service Worker registration failed:', err);
                }
            }
        }
        
        // ============================================
        // INITIALIZATION
        // ============================================
        
        async function init() {
            await initDB();
            await loadState();
            renderTemplateList();
            registerServiceWorker();
            
            // Close dropdowns on outside click
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.choice-token') && !e.target.closest('.choice-dropdown')) {
                    document.querySelectorAll('.choice-dropdown').forEach(d => d.remove());
                }
            });
            
            // Handle keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                // Ctrl/Cmd + S to save
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    saveCurrentTemplate();
                }
            });
            
            // Show folder selection when clicking folder name
            document.getElementById('currentFolderName').addEventListener('click', () => {
                if (!state.currentTemplate) return;
                showFolderSelectionModal();
            });
        }
        
        function showFolderSelectionModal() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            
            let folderOptions = '<option value="">Uncategorized</option>';
            
            function addFolderOptions(parentId = null, depth = 0) {
                state.folders.filter(f => f.parentId === parentId).forEach(f => {
                    folderOptions += `<option value="${f.id}" ${state.currentTemplate.folderId === f.id ? 'selected' : ''}>${'&nbsp;'.repeat(depth * 4)}${escapeHtml(f.name)}</option>`;
                    addFolderOptions(f.id, depth + 1);
                });
            }
            addFolderOptions();
            
            modal.innerHTML = `
                <div class="modal-content p-5">
                    <h3 class="text-lg font-semibold mb-4">Select Folder</h3>
                    <select id="folderSelect" class="input mb-4">
                        ${folderOptions}
                    </select>
                    <div class="flex gap-2 justify-end">
                        <button onclick="this.closest('.modal-overlay').remove()" class="btn btn-secondary">Cancel</button>
                        <button onclick="updateTemplateFolder()" class="btn btn-primary">Save</button>
                    </div>
                </div>
            `;
            document.getElementById('modalsContainer').appendChild(modal);
        }
        
        async function updateTemplateFolder() {
            const folderId = document.getElementById('folderSelect').value || null;
            if (state.currentTemplate) {
                state.currentTemplate.folderId = folderId;
                
                const folder = state.folders.find(f => f.id === folderId);
                document.getElementById('currentFolderName').textContent = folder ? folder.name : 'Uncategorized';
                
                await saveCurrentTemplate();
            }
            document.querySelector('.modal-overlay').remove();
        }
        
        // Start the app
        init();
    </script>
