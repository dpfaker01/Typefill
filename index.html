<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Native app viewport settings - no scaling allowed -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TypeFill">
    <meta name="application-name" content="TypeFill">
    <meta name="msapplication-TileColor" content="#4f46e5">
    <meta name="msapplication-tap-highlight" content="no">
    
    <meta name="description" content="Stop retyping the same emails, reviews, and messages. Create smart templates with variables, fill them in seconds. Works offline!">
    <meta name="keywords" content="template, text expander, mail merge, snippet, auto fill, form letter, copy paste, variable, shortcut, offline">
    <meta name="author" content="TypeFill">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="TypeFill - Create & Reuse Fill-in Templates">
    <meta property="og:description" content="Stop retyping the same emails, reviews, and messages. Create smart templates with variables, fill them in seconds. Works offline!">
    <meta property="og:image" content="icons/icon-512x512.png">
    
    <title>TypeFill - Create & Reuse Fill-in Templates</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180x180.png">
    
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
                            300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
                            600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Native App CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        html {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
        
        body {
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            overscroll-behavior-y: none;
            -webkit-overflow-scrolling: touch;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .dark body { 
            background-color: #0f172a; 
            color: #e2e8f0; 
        }
        
        .safe-area-top { 
            padding-top: env(safe-area-inset-top); 
        }
        .safe-area-bottom { 
            padding-bottom: env(safe-area-inset-bottom); 
        }
        
        #editor {
            outline: none; 
            line-height: 1.8; 
            white-space: pre-wrap;
            min-height: 300px; 
            font-size: 16px;
            -webkit-touch-callout: default; 
            user-select: text;
            touch-action: manipulation;
        }
        
        /* Variable Token Styles */
        .token {
            background-color: #e0e7ff; 
            color: #4338ca;
            border-bottom: 2px solid #4f46e5; 
            padding: 0 4px;
            border-radius: 4px; 
            font-weight: 600;
            display: inline-block; 
            cursor: pointer;
            transition: all 0.2s; 
            word-break: break-all;
        }
        
        .dark .token {
            background-color: #312e81; 
            color: #c7d2fe;
            border-bottom-color: #6366f1;
        }
        
        .token:hover { 
            background-color: #c7d2fe; 
        }
        .dark .token:hover { 
            background-color: #4338ca; 
        }
        
        /* Choice Token Styles - Distinct look */
        .choice-token {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
            border: 2px solid #f59e0b;
            padding: 2px 20px 2px 6px;
            border-radius: 6px;
            font-weight: 600;
            display: inline-block;
            cursor: pointer;
            transition: all 0.2s;
            word-break: break-all;
            position: relative;
            min-height: 24px;
        }
        
        .choice-token::after {
            content: '▼';
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            opacity: 0.7;
        }
        
        .dark .choice-token {
            background: linear-gradient(135deg, #78350f, #92400e);
            color: #fef3c7;
            border-color: #d97706;
        }
        
        .choice-token:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
        }
        
        .choice-token.active {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
        
        /* Choice Dropdown */
        .choice-dropdown {
            position: absolute;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            min-width: 120px;
            max-width: 250px;
            overflow: hidden;
            animation: dropIn 0.2s ease-out;
        }
        
        .dark .choice-dropdown {
            background: #1e293b;
            border-color: #475569;
        }
        
        @keyframes dropIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .choice-option {
            padding: 10px 14px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 14px;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .dark .choice-option {
            border-bottom-color: #334155;
        }
        
        .choice-option:last-child {
            border-bottom: none;
        }
        
        .choice-option:hover,
        .choice-option:active {
            background: #fef3c7;
            color: #92400e;
        }
        
        .dark .choice-option:hover,
        .dark .choice-option:active {
            background: #78350f;
            color: #fef3c7;
        }
        
        .choice-option.selected {
            background: #f59e0b;
            color: white;
            font-weight: 600;
        }
        
        .dark .choice-option.selected {
            background: #d97706;
        }
        
        /* Hashtag Styles */
        .hashtag {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .hashtag:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4);
        }
        
        .hashtag-input {
            border: 2px dashed #c7d2fe;
            border-radius: 12px;
            padding: 4px 8px;
            font-size: 12px;
            background: transparent;
            color: #6366f1;
            min-width: 80px;
            transition: all 0.2s;
        }
        
        .hashtag-input:focus {
            border-color: #6366f1;
            outline: none;
            background: rgba(99, 102, 241, 0.1);
        }
        
        .dark .hashtag-input {
            border-color: #4338ca;
            color: #a5b4fc;
        }
        
        .dark .hashtag-input:focus {
            background: rgba(99, 102, 241, 0.2);
        }
        
        /* Search Styles */
        .search-container {
            position: relative;
        }
        
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
            margin-top: 8px;
        }
        
        .dark .search-results {
            background: #1e293b;
            border-color: #475569;
        }
        
        .search-result-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
        }
        
        .dark .search-result-item {
            border-bottom-color: #334155;
        }
        
        .search-result-item:hover,
        .search-result-item:active {
            background: #f1f5f9;
        }
        
        .dark .search-result-item:hover,
        .dark .search-result-item:active {
            background: #334155;
        }
        
        .search-result-item:last-child {
            border-bottom: none;
        }
        
        .search-highlight {
            background: #fef08a;
            padding: 0 2px;
            border-radius: 2px;
        }
        
        .dark .search-highlight {
            background: #854d0e;
        }
        
        #floater {
            position: absolute; 
            display: none; 
            background: #1e293b;
            color: white; 
            padding: 12px 20px; 
            border-radius: 50px;
            font-size: 14px; 
            font-weight: 600; 
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            z-index: 50; 
            animation: popIn 0.15s ease-out;
            border: none; 
            -webkit-tap-highlight-color: rgba(255, 255, 255, 0.2);
            touch-action: manipulation;
        }
        
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .touch-btn { 
            min-height: 44px; 
            min-width: 44px; 
            touch-action: manipulation;
        }
        
        ::-webkit-scrollbar { 
            width: 4px; 
            height: 4px; 
        }
        ::-webkit-scrollbar-track { 
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb { 
            background: #cbd5e1; 
            border-radius: 2px; 
        }
        .dark ::-webkit-scrollbar-thumb { 
            background: #475569; 
        }
        
        .toast {
            position: fixed; 
            bottom: 80px; 
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b; 
            color: white;
            padding: 12px 24px; 
            border-radius: 8px;
            font-size: 14px; 
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            z-index: 150; 
            opacity: 0; 
            transition: all 0.3s ease;
            max-width: 90vw; 
            text-align: center;
            touch-action: manipulation;
        }
        
        .toast.show { 
            transform: translateX(-50%) translateY(0); 
            opacity: 1; 
        }
        
        @media (min-width: 768px) {
            #editor { 
                font-size: 18px; 
                min-height: 400px; 
            }
            .mobile-only { 
                display: none; 
            }
        }
        
        @media (max-width: 767px) {
            .desktop-only { 
                display: none; 
            }
            aside {
                position: fixed; 
                top: 0; 
                left: 0; 
                right: 0; 
                bottom: 0;
                z-index: 100; 
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                width: 85% !important; 
                max-width: 320px;
                overscroll-behavior-y: contain;
            }
            aside.open { 
                transform: translateX(0); 
            }
            .sidebar-overlay {
                position: fixed; 
                top: 0; 
                left: 0; 
                right: 0; 
                bottom: 0;
                background: rgba(0,0,0,0.5); 
                z-index: 99;
                opacity: 0; 
                pointer-events: none;
                transition: opacity 0.3s ease;
            }
            .sidebar-overlay.open { 
                opacity: 1; 
                pointer-events: all; 
            }
        }
        
        .scrollable-y {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            touch-action: pan-y;
        }
        
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
        details[open] > summary .arrow {
            transform: rotate(90deg);
        }
        details > summary .arrow {
            transition: transform 0.2s ease;
        }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        
        .modal-overlay.open {
            display: flex;
        }
        
        .modal-content {
            background: white;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            overflow: hidden;
        }
        
        .modal-overlay.open .modal-content {
            transform: translateY(0);
        }
        
        .dark .modal-content {
            background: #1e293b;
        }
        
        /* Choices Modal Specific Styles */
        .choice-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .dark .choice-item {
            background: #334155;
            border-color: #475569;
        }
        
        .choice-item input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            outline: none;
        }
        
        .choice-item .remove-btn {
            color: #ef4444;
            cursor: pointer;
            padding: 4px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        
        .choice-item .remove-btn:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-800">

    <div id="installBanner" class="hidden bg-indigo-600 text-white px-4 py-3 text-center text-sm flex items-center justify-between">
        <span class="flex-1">Install TypeFill for offline access</span>
        <div class="flex gap-2">
            <button onclick="installPWA()" class="bg-white text-indigo-600 px-4 py-1.5 rounded font-semibold text-xs touch-btn">Install</button>
            <button onclick="dismissInstall()" class="text-white opacity-75 px-2 touch-btn">x</button>
        </div>
    </div>

    <header class="bg-white border-b border-gray-200 h-16 flex justify-between items-center px-4 md:px-6 shadow-sm z-20 shrink-0 safe-area-top">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="md:hidden touch-btn flex items-center justify-center -ml-2 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-800">
                <svg class="w-6 h-6 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            
            <div class="bg-indigo-600 text-white p-1.5 rounded-lg shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z" />
                    <path fill-rule="evenodd" d="M2 6a2 2 0 012-2h4a1 1 0 010 2H4v10h10v-4a1 1 0 112 0v4a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" clip-rule="evenodd" />
                </svg>
            </div>
            <div>
                <h1 class="font-bold text-lg tracking-tight dark:text-white leading-tight">TypeFill</h1>
                <p class="text-xs text-gray-500 dark:text-gray-400 hidden sm:block">Create & Reuse Templates Offline</p>
            </div>
        </div>
        
        <div class="flex gap-2 items-center">
            <!-- Search Button -->
            <button onclick="toggleSearch()" class="touch-btn p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-800 transition" title="Search Templates">
                <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </button>
            
            <!-- Make Variable Button -->
            <button onclick="makeVariableFromSelection()" id="makeVarBtn" class="hidden sm:flex items-center gap-2 text-sm font-medium text-emerald-700 bg-emerald-50 hover:bg-emerald-100 px-3 py-2 rounded-md transition border border-emerald-200 dark:border-emerald-800 dark:text-emerald-400 dark:bg-emerald-900 dark:hover:bg-emerald-800 touch-btn" title="Create variable from selected text">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
                </svg>
                <span>Make Variable</span>
            </button>
            
            <!-- Make Choices Button -->
            <button onclick="makeChoicesFromSelection()" id="makeChoicesBtn" class="hidden sm:flex items-center gap-2 text-sm font-medium text-amber-700 bg-amber-50 hover:bg-amber-100 px-3 py-2 rounded-md transition border border-amber-200 dark:border-amber-800 dark:text-amber-400 dark:bg-amber-900 dark:hover:bg-amber-800 touch-btn" title="Create choices from selected text">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l4-4 4 4m0 6l-4 4-4-4"/>
                </svg>
                <span>Make Choices</span>
            </button>

            <button onclick="toggleTheme()" class="touch-btn p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-800 transition" title="Toggle Theme">
                <svg id="sunIcon" class="w-5 h-5 text-amber-500 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg id="moonIcon" class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
            </button>
            
            <button onclick="saveCurrentTemplate()" class="hidden md:flex text-sm font-medium text-indigo-600 hover:bg-indigo-50 px-4 py-2 rounded-md transition border border-indigo-200 dark:border-indigo-800 dark:text-indigo-400 dark:hover:bg-indigo-900 touch-btn">
                Save
            </button>
            <button onclick="copyFinalText()" id="copyBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-md shadow-md transition flex items-center gap-2 touch-btn">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
                <span class="hidden sm:inline">Copy</span>
            </button>
        </div>
    </header>
    
    <!-- Global Search Modal -->
    <div id="searchModal" class="modal-overlay">
        <div class="modal-content">
            <div class="p-4 border-b border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800">
                <div class="flex items-center gap-3">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input type="text" id="globalSearchInput" 
                        class="flex-1 text-lg bg-transparent outline-none dark:text-white placeholder-gray-400"
                        placeholder="Search templates, hashtags, content..."
                        oninput="performGlobalSearch(this.value)">
                    <button onclick="toggleSearch()" class="touch-btn p-2 text-gray-400 hover:text-gray-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="globalSearchResults" class="max-h-96 overflow-y-auto bg-white dark:bg-slate-800 scrollable-y">
                <div class="p-8 text-center text-gray-400 dark:text-gray-500">
                    <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <p class="text-sm">Type to search all templates</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Choices Modal -->
    <div id="choicesModal" class="modal-overlay">
        <div class="modal-content">
            <div class="p-4 border-b border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-bold text-gray-800 dark:text-white">Make Choices</h3>

    <div id="toast" class="toast"></div>

    <script>
        // ==========================================
        // NATIVE APP PREVENTION SCRIPTS
        // ==========================================
        
        (function preventZoom() {
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(e) {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, { passive: false });

            document.addEventListener('touchmove', function(e) {
                if (e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false });

            document.addEventListener('touchstart', function(e) {
                if (e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false });
            
            document.addEventListener('gesturestart', function(e) {
                e.preventDefault();
            }, { passive: false });
            
            document.addEventListener('gesturechange', function(e) {
                e.preventDefault();
            }, { passive: false });
            
            document.addEventListener('gestureend', function(e) {
                e.preventDefault();
            }, { passive: false });
        })();

        // ==========================================
        // DATABASE LAYER
        // ==========================================
        
        const DB_NAME = 'TypeFillDB';
        const DB_VERSION = 3; // Bumped version for choices support
        const STORE_TEMPLATES = 'templates';
        const STORE_FOLDERS = 'folders';
        const STORE_SETTINGS = 'settings';
        
        let db = null;
        let deferredPrompt = null;

        async function initDatabase() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = () => reject(request.error);
                
                request.onsuccess = () => {
                    db = request.result;
                    console.log('[TypeFill] Database initialized');
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    
                    if (!database.objectStoreNames.contains(STORE_TEMPLATES)) {
                        const templateStore = database.createObjectStore(STORE_TEMPLATES, { keyPath: 'id' });
                        templateStore.createIndex('folderId', 'folderId', { unique: false });
                        templateStore.createIndex('updatedAt', 'updatedAt', { unique: false });
                    }
                    
                    if (!database.objectStoreNames.contains(STORE_FOLDERS)) {
                        database.createObjectStore(STORE_FOLDERS, { keyPath: 'id' });
                    }
                    
                    if (!database.objectStoreNames.contains(STORE_SETTINGS)) {
                        database.createObjectStore(STORE_SETTINGS, { keyPath: 'key' });
                    }
                };
            });
        }

        async function requestPersistentStorage() {
            if (navigator.storage && navigator.storage.persist) {
                try {
                    const isPersistent = await navigator.storage.persist();
                    console.log(`[TypeFill] Persistent storage: ${isPersistent}`);
                    return isPersistent;
                } catch (err) {
                    console.log('[TypeFill] Persistent storage request failed:', err);
                    return false;
                }
            }
            return false;
        }

        const DataLayer = {
            async saveTemplates(templates) {
                const tx = db.transaction(STORE_TEMPLATES, 'readwrite');
                const store = tx.objectStore(STORE_TEMPLATES);
                await store.clear();
                for (const template of templates) {
                    await store.put(template);
                }
                return new Promise((resolve, reject) => {
                    tx.oncomplete = resolve;
                    tx.onerror = () => reject(tx.error);
                });
            },
            
            async getTemplates() {
                const tx = db.transaction(STORE_TEMPLATES, 'readonly');
                const store = tx.objectStore(STORE_TEMPLATES);
                const request = store.getAll();
                return new Promise((resolve, reject) => {
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },
            
            async saveFolders(folders) {
                const tx = db.transaction(STORE_FOLDERS, 'readwrite');
                const store = tx.objectStore(STORE_FOLDERS);
                await store.clear();
                for (const folder of folders) {
                    await store.put(folder);
                }
                return new Promise((resolve, reject) => {
                    tx.oncomplete = resolve;
                    tx.onerror = () => reject(tx.error);
                });
            },
            
            async getFolders() {
                const tx = db.transaction(STORE_FOLDERS, 'readonly');
                const store = tx.objectStore(STORE_FOLDERS);
                const request = store.getAll();
                return new Promise((resolve, reject) => {
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },
            
            async saveSetting(key, value) {
                const tx = db.transaction(STORE_SETTINGS, 'readwrite');
                const store = tx.objectStore(STORE_SETTINGS);
                await store.put({ key, value, timestamp: Date.now() });
                return new Promise((resolve, reject) => {
                    tx.oncomplete = resolve;
                    tx.onerror = () => reject(tx.error);
                });
            },
            
            async getSetting(key) {
                const tx = db.transaction(STORE_SETTINGS, 'readonly');
                const store = tx.objectStore(STORE_SETTINGS);
                const request = store.get(key);
                return new Promise((resolve, reject) => {
                    request.onsuccess = () => resolve(request.result?.value);
                    request.onerror = () => reject(request.error);
                });
            }
        };

        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        
        const state = {
            templates: [],
            folders: [],
            currentVariables: [], 
            currentChoices: [], // NEW: Choices for current template
            currentTemplateId: null,
            currentHashtags: [],
            darkMode: false,
            isMobile: window.innerWidth < 768
        };

        // Choices editing state
        let editingChoiceId = null;
        let tempChoicesList = [];

        // ==========================================
        // SERVICE WORKER REGISTRATION
        // ==========================================
        
        async function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.register('./sw.js', {
                        scope: './',
                        updateViaCache: 'none'
                    });
                    console.log('[TypeFill] SW registered:', registration.scope);
                    
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showToast('Update available! Refresh to update.');
                                if (confirm('New version available! Reload now?')) {
                                    window.location.reload();
                                }
                            }
                        });
                    });
                } catch (err) {
                    console.log('[TypeFill] SW registration failed:', err);
                }
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                showToast('Loading TypeFill...');
                
                await registerServiceWorker();
                await initDatabase();
                await requestPersistentStorage();
                await loadTheme();
                await loadStateFromStorage();
                
                if (state.templates.length === 0) {
                    editor.innerHTML = `Welcome to TypeFill! 

Create your first template by typing here.

Highlight text to:
• Make Variable - Replace with custom text
• Make Choices - Create a dropdown with options

Add hashtags below to organize your templates!`;
                } else {
                    loadTemplateUI(state.templates[0].id);
                }
                
                renderTemplateList();
                setupInstallPrompt();
                
                const fileInput = document.getElementById('importFileInput');
                if (fileInput) {
                    fileInput.addEventListener('change', function() {
                        handleImport(this);
                    });
                }
                
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('action') === 'search') {
                    setTimeout(() => toggleSearch(), 500);
                }
                
                showToast('TypeFill Ready - Works Offline!');
            } catch (err) {
                console.error('Initialization error:', err);
                showToast('Error loading app');
            }
        });

        // ==========================================
        // PWA INSTALL PROMPT
        // ==========================================
        
        function setupInstallPrompt() {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                
                setTimeout(() => {
                    const banner = document.getElementById('installBanner');
                    const dismissed = localStorage.getItem('installBannerDismissed');
                    if (banner && !dismissed && !window.matchMedia('(display-mode: standalone)').matches) {
                        banner.classList.remove('hidden');
                    }
                }, 3000);
            });
        }

        window.installPWA = async function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    showToast('TypeFill installed!');
                    document.getElementById('installBanner').classList.add('hidden');
                }
                deferredPrompt = null;
            }
        };

        window.dismissInstall = function() {
            document.getElementById('installBanner').classList.add('hidden');
            localStorage.setItem('installBannerDismissed', 'true');
        };

        // ==========================================
        // THEME MANAGEMENT
        // ==========================================
        
        async function loadTheme() {
            try {
                const savedTheme = await DataLayer.getSetting('theme');
                if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    enableDarkMode();
                } else {
                    enableLightMode();
                }
            } catch (err) {
                console.log('[TypeFill] Theme load error:', err);
            }
        }

        window.toggleTheme = function() {
            if (state.darkMode) {
                enableLightMode();
                DataLayer.saveSetting('theme', 'light');
            } else {
                enableDarkMode();
                DataLayer.saveSetting('theme', 'dark');
            }
        };

        function enableDarkMode() {
            document.documentElement.classList.add('dark');
            state.darkMode = true;
            const sunIcon = document.getElementById('sunIcon');
            const moonIcon = document.getElementById('moonIcon');
            if (sunIcon) sunIcon.classList.remove('hidden');
            if (moonIcon) moonIcon.classList.add('hidden');
        }

        function enableLightMode() {
            document.documentElement.classList.remove('dark');
            state.darkMode = false;
            const sunIcon = document.getElementById('sunIcon');
            const moonIcon = document.getElementById('moonIcon');
            if (sunIcon) sunIcon.classList.add('hidden');
            if (moonIcon) moonIcon.classList.remove('hidden');
        }

        // ==========================================
        // STATE PERSISTENCE
        // ==========================================
        
        async function loadStateFromStorage() {
            try {
                const [templates, folders] = await Promise.all([
                    DataLayer.getTemplates(),
                    DataLayer.getFolders()
                ]);
                
                state.templates = templates || [];
                state.folders = folders || [];
                
                const oldData = localStorage.getItem('template_master_db_v2');
                if (oldData && state.templates.length === 0) {
                    const parsed = JSON.parse(oldData);
                    state.templates = parsed.templates || [];
                    state.folders = parsed.folders || [];
                    await persistState();
                    localStorage.removeItem('template_master_db_v2');
                    showToast('Data migrated to secure storage');
                }
            } catch (err) {
                console.error('[TypeFill] Storage load error:', err);
            }
        }

        async function persistState() {
            try {
                await Promise.all([
                    DataLayer.saveTemplates(state.templates),
                    DataLayer.saveFolders(state.folders)
                ]);
                console.log('[TypeFill] State persisted');
            } catch (err) {
                console.error('[TypeFill] Save error:', err);
                showToast('Failed to save data');
            }
        }

        // ==========================================
        // UI HELPERS
        // ==========================================
        
        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            if (sidebar) sidebar.classList.toggle('open');
            if (overlay) overlay.classList.toggle('open');
        };

        window.toggleVariablesPanel = function() {
            const panel = document.getElementById('variablesPanel');
            if (panel) {
                panel.classList.toggle('hidden');
                panel.classList.toggle('translate-x-full');
            }
        };

        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            if (toast) {
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), duration);
            }
        }

        window.closeAllFolders = function() {
            const allDetails = document.querySelectorAll('#templateList details');
            allDetails.forEach(details => {
                details.open = false;
            });
            showToast('All folders closed');
        };

        // ==========================================
        // GLOBAL SEARCH FUNCTIONALITY
        // ==========================================
        
        window.toggleSearch = function() {
            const modal = document.getElementById('searchModal');
            const input = document.getElementById('globalSearchInput');
            
            if (modal.classList.contains('open')) {
                modal.classList.remove('open');
            } else {
                modal.classList.add('open');
                if (input) {
                    setTimeout(() => input.focus(), 100);
                }
            }
        };

        window.performGlobalSearch = function(query) {
            const resultsContainer = document.getElementById('globalSearchResults');
            
            if (!query || query.trim().length === 0) {
                resultsContainer.innerHTML = `
                    <div class="p-8 text-center text-gray-400 dark:text-gray-500">
                        <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <p class="text-sm">Type to search all templates</p>
                    </div>
                `;
                return;
            }
            
            const normalizedQuery = query.toLowerCase().trim();
            const results = [];
            
            state.templates.forEach(template => {
                let matches = [];
                let matchType = '';
                
                if (template.name && template.name.toLowerCase().includes(normalizedQuery)) {
                    matches.push({ field: 'name', text: template.name });
                    matchType = 'name';
                }
                
                if (template.hashtags && template.hashtags.length > 0) {
                    template.hashtags.forEach(tag => {
                        if (tag.toLowerCase().includes(normalizedQuery)) {
                            matches.push({ field: 'hashtag', text: tag });
                            matchType = 'hashtag';
                        }
                    });
                }
                
                if (template.html) {
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = template.html;
                    const plainText = tempDiv.textContent || tempDiv.innerText;
                    
                    if (plainText.toLowerCase().includes(normalizedQuery)) {
                        const index = plainText.toLowerCase().indexOf(normalizedQuery);
                        const start = Math.max(0, index - 40);
                        const end = Math.min(plainText.length, index + query.length + 40);
                        const context = (start > 0 ? '...' : '') + 
                            plainText.substring(start, end) + 
                            (end < plainText.length ? '...' : '');
                        
                        matches.push({ field: 'content', text: context, plainText });
                        if (!matchType) matchType = 'content';
                    }
                }
                
                if (matches.length > 0) {
                    results.push({
                        template,
                        matches,
                        matchType
                    });
                }
            });
            
            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="p-8 text-center text-gray-400 dark:text-gray-500">
                        <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <p class="text-sm">No results found for "${escapeHtml(query)}"</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            results.forEach(result => {
                const { template, matches, matchType } = result;
                const folder = state.folders.find(f => f.id === template.folderId);
                
                html += `
                    <div class="search-result-item" onclick="selectSearchResult('${template.id}')">
                        <div class="flex items-start gap-3">
                            <div class="bg-indigo-100 dark:bg-indigo-900 p-2 rounded-lg">
                                <svg class="w-4 h-4 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="font-medium text-gray-900 dark:text-white truncate">
                                    ${highlightMatch(template.name, query)}
                                </div>
                                ${folder ? `<div class="text-xs text-gray-400 mt-0.5">📁 ${escapeHtml(folder.name)}</div>` : ''}
                                ${renderMatchPreview(matches, query)}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            resultsContainer.innerHTML = html;
        };

        function highlightMatch(text, query) {
            if (!query || !text) return escapeHtml(text);
            const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
            return escapeHtml(text).replace(regex, '<span class="search-highlight">$1</span>');
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function renderMatchPreview(matches, query) {
            const contentMatch = matches.find(m => m.field === 'content');
            const hashtagMatches = matches.filter(m => m.field === 'hashtag');
            
            let html = '';
            
            if (hashtagMatches.length > 0) {
                html += `<div class="flex flex-wrap gap-1 mt-2">`;
                hashtagMatches.forEach(m => {
                    html += `<span class="hashtag text-xs">#${highlightMatch(m.text.replace('#', ''), query)}</span>`;
                });
                html += `</div>`;
            }
            
            if (contentMatch) {
                html += `<div class="text-xs text-gray-500 dark:text-gray-400 mt-2 line-clamp-2">
                    "${highlightMatch(contentMatch.text, query)}"
                </div>`;
            }
            
            return html;
        }

        window.saveChoices = function() {
            // Validate - filter out empty choices except original
            const validChoices = tempChoicesList.filter(c => c.text.trim().length > 0);
            
            if (validChoices.length < 2) {
                showToast('Add at least one more option');
                return;
            }
            
            const originalText = tempChoicesList.find(c => c.isOriginal)?.text;
            
            // Create choice token in editor
            createChoiceToken(originalText, validChoices.map(c => c.text), editingChoiceId);
            
            // Save to state
            state.currentChoices.push({
                id: editingChoiceId,
                original: originalText,
                options: validChoices.map(c => c.text),
                selected: originalText
            });
            
            closeChoicesModal();
            renderSidebar();
            showToast('Choices created!');
        };

        function createChoiceToken(originalText, options, choiceId) {
            if (!editor) return;
            
            const walker = document.createTreeWalker(
                editor, 
                NodeFilter.SHOW_TEXT, 
                null, 
                false
            );
            
            const nodesToReplace = [];
            
            while (walker.nextNode()) {
                const node = walker.currentNode;
                if (node.nodeValue.includes(originalText)) {
                    let parent = node.parentElement;
                    let isInToken = false;
                    while (parent && parent !== editor) {
                        if (parent.classList && (parent.classList.contains('token') || parent.classList.contains('choice-token'))) {
                            isInToken = true;
                            break;
                        }
                        parent = parent.parentElement;
                    }
                    
                    if (!isInToken) {
                        nodesToReplace.push(node);
                    }
                }
            }
            
            nodesToReplace.forEach(node => {
                const fragment = document.createDocumentFragment();
                const parts = node.nodeValue.split(originalText);
                
                parts.forEach((part, index) => {
                    fragment.appendChild(document.createTextNode(part));
                    
                    if (index < parts.length - 1) {
                        const span = document.createElement('span');
                        span.className = 'choice-token';
                        span.dataset.id = choiceId;
                        span.dataset.options = JSON.stringify(options);
                        span.textContent = originalText;
                        span.onclick = (e) => showChoiceDropdown(e, choiceId);
                        fragment.appendChild(span);
                    }
                });
                
                if (node.parentNode) {
                    node.parentNode.replaceChild(fragment, node);
                }
            });
        }

        window.showChoiceDropdown = function(event, choiceId) {
            event.stopPropagation();
            
            const choice = state.currentChoices.find(c => c.id === choiceId);
            if (!choice) return;
            
            const dropdown = document.getElementById('choiceDropdown');
            const token = event.target;
            
            // Position dropdown
            const rect = token.getBoundingClientRect();
            dropdown.style.top = `${rect.bottom + window.scrollY + 4}px`;
            dropdown.style.left = `${Math.min(rect.left, window.innerWidth - 150)}px`;
            
            // Render options
            let html = '';
            choice.options.forEach(option => {
                const isSelected = option === choice.selected;
                html += `
                    <div class="choice-option ${isSelected ? 'selected' : ''}" 
                         onclick="selectChoiceOption('${choiceId}', '${escapeHtml(option)}', event)">
                        ${escapeHtml(option)}
                        ${isSelected ? ' ✓' : ''}
                    </div>
                `;
            });
            
            dropdown.innerHTML = html;
            dropdown.classList.remove('hidden');
            
            // Close dropdown when clicking outside
            const closeDropdown = (e) => {
                if (!dropdown.contains(e.target) && !e.target.classList.contains('choice-token')) {
                    dropdown.classList.add('hidden');
                    document.removeEventListener('click', closeDropdown);
                }
            };
            
            setTimeout(() => {
                document.addEventListener('click', closeDropdown);
            }, 100);
        };

            const choice = state.currentChoices.find(c => c.id === choiceId);

            choice.selected = option;
            
            // Update all tokens with this choiceId
            const tokens = document.querySelectorAll(`.choice-token[data-id="${choiceId}"]`);
            tokens.forEach(token => {
                token.textContent = option;
            });
            
            // Hide dropdown
            document.getElementById('choiceDropdown').classList.add('hidden');
            
            showToast(`Selected: ${option}`);
            renderSidebar();

        window.moveTemplate = async function(templateId, e) {
            if (e) e.stopPropagation();
            
            if (state.folders.length === 0) {
                alert("Create a folder first!");
                return;
            }

            let msg = "Select folder:\n\n0: Uncategorized\n";
            state.folders.forEach((f, idx) => {
                msg += `${idx + 1}: ${f.name}\n`;
            });

            const response = prompt(msg);
            if (response === null) return;
            
            const index = parseInt(response);
            const template = state.templates.find(t => t.id === templateId);
            if (!template) return;

            if (index === 0) {
                delete template.folderId;
                showToast('Moved to Uncategorized');

                template.folderId = state.folders[index - 1].id;
                showToast(`Moved to ${state.folders[index - 1].name}`);

        // ==========================================

        window.exportData = async function() {
            if (state.templates.length === 0 && state.folders.length === 0) {
                alert("Nothing to export!");
                return;
            }
            
            const exportObj = {
                app: "TypeFill",
                version: "3.0.0",
                exportDate: new Date().toISOString(),
                folders: state.folders,
                templates: state.templates
            };

            const dataStr = JSON.stringify(exportObj, null, 2);
            const date = new Date().toISOString().slice(0, 10);
            const filename = `typefill_backup_${date}.json`;
            
            try {
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.style.display = 'none';
                document.body.appendChild(a);
                
                if (navigator.userAgent.match(/iPad|iPhone|iPod/i)) {
                    a.target = '_blank';
                }
                
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 1000);
                
                showToast("Exporting backup file...");
                
            } catch (err) {
                console.error('[TypeFill] Export error:', err);
                
                try {
                    const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
                    const a = document.createElement('a');
                    a.href = dataUri;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    showToast("Exported (fallback method)");
                } catch (err2) {
                    const text = prompt("Copy this data manually:", dataStr);
                    if (text === null) {
                        showToast("Export cancelled");
                    }
                }
            }
        };

        window.handleImport = async function(input) {
            console.log('[TypeFill] Import started');
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    let newTemplates = [];
                    let newFolders = [];

                    if (Array.isArray(data)) {
                        newTemplates = data;
                    } else if (data.templates) {
                        newTemplates = data.templates;
                        newFolders = data.folders || [];
                    } else {
                        throw new Error("Invalid format");
                    }

                    const shouldOverwrite = confirm("Click OK to OVERWRITE current data.\nClick CANCEL to MERGE with existing data.");
                    
                    if (shouldOverwrite) {
                        state.templates = newTemplates;
                        state.folders = newFolders;
                        await finalizeImport("Data overwritten successfully!");
                    } else {
                        newFolders.forEach(nf => {
                            if (!state.folders.find(cf => cf.id === nf.id)) {
                                state.folders.push(nf);
                            }
                        });
                        newTemplates.forEach(nt => {
                            const idx = state.templates.findIndex(curr => curr.id === nt.id);
                            if (idx > -1) {
                                state.templates[idx] = nt;
                            } else {
                                state.templates.push(nt);
                            }
                        });
                        await finalizeImport("Data merged successfully!");
                    }
                } catch (err) {
                    console.error('[TypeFill] Import error:', err);
                    alert("Error loading file: " + err.message);
                }
                input.value = '';
            };
            
            reader.onerror = () => {
                alert("Error reading file");
                input.value = '';
            };
            
            reader.readAsText(file);
        };

        async function finalizeImport(msg) {
            await persistState();
            renderTemplateList();
            if (state.templates.length > 0) {
                loadTemplateUI(state.templates[0].id);
            }
